<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TUNG DevOps | Premium Dashboard</title>
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            },
            colors: {
              glass: 'rgba(255, 255, 255, 0.03)',
              'glass-border': 'rgba(255, 255, 255, 0.08)',
            }
          }
        }
      }
    </script>
    
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply bg-[#020617] text-slate-100 antialiased overflow-x-hidden;
          background-image: 
            radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.1) 0px, transparent 50%),
            radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.1) 0px, transparent 50%),
            radial-gradient(at 50% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
        }
      }

      .glass-card {
        @apply bg-glass backdrop-blur-xl border border-glass-border shadow-[0_8px_32px_0_rgba(0,0,0,0.37)];
      }

      .neon-border-blue {
        @apply border-blue-500/30 hover:border-blue-400 group-hover:shadow-[0_0_20px_rgba(59,130,246,0.2)];
      }

      .neon-border-green {
        @apply border-emerald-500/30 hover:border-emerald-400 group-hover:shadow-[0_0_20px_rgba(16,185,129,0.2)];
      }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        @apply bg-slate-900;
      }
      ::-webkit-scrollbar-thumb {
        @apply bg-slate-700 rounded-full hover:bg-slate-600;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
