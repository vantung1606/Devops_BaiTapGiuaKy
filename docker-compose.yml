version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-admin123}
      MYSQL_DATABASE: ${DB_NAME:-expense_db}
    ports: ["3307:3306"]
    volumes: [mysql_data:/var/lib/mysql]

  backend:
    build: ./backend
    container_name: node_backend
    ports: ["5000:5000"]
    depends_on: [db]
    # Chế độ Volume: Sửa code máy thật -> Container đổi ngay
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=${DB_PASS:-admin123}
      - DB_NAME=${DB_NAME:-expense_db}
      - STUDENT_NAME=${STUDENT_NAME}
      - STUDENT_ID=${STUDENT_ID}
      - STUDENT_CLASS=${STUDENT_CLASS}
    # Chạy bằng nodemon để tự restart khi code đổi
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: react_frontend
    ports: ["8081:80"]
    depends_on: [backend]

volumes:
  mysql_data:
